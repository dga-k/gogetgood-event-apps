<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff - ระบบบันทึกผลใบเสร็จ</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans">

  <div class="max-w-md mx-auto p-4 min-h-screen flex flex-col justify-between">
    
    <header class="mb-6">
      <h1 class="text-2xl font-bold text-indigo-600">บันทึกข้อมูลลูกค้า & เกม</h1>
      <p class="text-sm text-gray-500">กรอกข้อมูลและเลือกรางวัลให้ลูกค้า</p>
    </header>

    <div id="form-section" class="bg-white p-5 rounded-2xl shadow-sm space-y-4 border border-gray-100">
      <h2 class="text-lg font-semibold text-gray-700 flex items-center gap-2">
        <span class="w-6 h-6 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-xs">1</span>
        ข้อมูลใบเสร็จและลูกค้า
      </h2>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">ถ่ายรูปใบเสร็จ</label>
        <div class="flex items-center justify-center w-full">
          <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100">
            <div id="upload-placeholder" class="flex flex-col items-center justify-center pt-5 pb-6">
              <svg class="w-8 h-8 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
              <p class="text-xs text-gray-500">กดเพื่อถ่ายภาพ หรือ อัปโหลดรูป</p>
            </div>
            <img id="image-preview" class="hidden w-full h-full object-contain rounded-xl p-2" />
            <input id="receipt-file" type="file" accept="image/*" capture="environment" class="hidden" />
          </label>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-3">
        <div>
          <label class="block text-xs font-medium text-gray-600">ชื่อ-นามสกุล</label>
          <input type="text" id="cust-name" class="w-full mt-1 p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="สมชาย ใจดี">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600">เบอร์โทรศัพท์</label>
          <input type="tel" id="cust-phone" class="w-full mt-1 p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="08XXXXXXXX">
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-xs font-medium text-gray-600">สัญชาติ</label>
            <select id="cust-nationality" class="w-full mt-1 p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
              <option value="Thai">ไทย (Thai)</option>
              <option value="Chinese">จีน (Chinese)</option>
              <option value="English">อังกฤษ (English)</option>
              <option value="Other">อื่นๆ</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600">ยอดเงินในใบเสร็จ (บาท)</label>
            <input type="number" id="receipt-amount" class="w-full mt-1 p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="1500">
          </div>
        </div>
      </div>

      <button id="btn-save-receipt" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-medium hover:bg-indigo-700 active:scale-[0.98] transition-transform">
        บันทึกใบเสร็จ & ไปหน้าเลือกของรางวัล
      </button>
    </div>

    <div id="reward-section" class="hidden bg-white p-5 rounded-2xl shadow-sm space-y-4 border border-gray-100">
      <h2 class="text-lg font-semibold text-gray-700 flex items-center gap-2">
        <span class="w-6 h-6 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-xs">2</span>
        ผลการเล่นเกม & ของรางวัล
      </h2>
      
      <div class="bg-indigo-50 p-3 rounded-xl text-xs text-indigo-800">
        <p><strong>ลูกค้า:</strong> <span id="summary-name">-</span></p>
        <p class="mt-1">ยอดใบเสร็จ <span id="summary-amount">0</span> บาท บันทึกเข้าระบบแล้ว</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">เลือกของรางวัลที่ลูกค้าได้รับ</label>
        <div id="reward-options-container" class="grid grid-cols-1 gap-2">
          </div>
      </div>

      <button id="btn-finalize" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-medium hover:bg-emerald-700 active:scale-[0.98] transition-transform">
        บันทึกรางวัล & จบงาน
      </button>
    </div>

    <footer class="text-center text-xs text-gray-400 mt-6">
      Receipt & Game App © 2026
    </footer>
  </div>

  <script>
    // ตั้งค่า Supabase 
    

    let currentRecordId = null; // เก็บ ID ที่พึ่งสร้างขึ้น

    // ส่วนของ Preview รูปภาพ
    const fileInput = document.getElementById('receipt-file');
    const imgPreview = document.getElementById('image-preview');
    const uploadPlaceholder = document.getElementById('upload-placeholder');

    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          imgPreview.src = event.target.result;
          imgPreview.classList.remove('hidden');
          uploadPlaceholder.classList.add('hidden');
        }
        reader.readAsDataURL(file);
      }
    });

    // บันทึกขั้นตอนที่ 1: ข้อมูลลูกค้า + อัปโหลดภาพ
    document.getElementById('btn-save-receipt').addEventListener('click', async () => {
      const name = document.getElementById('cust-name').value;
      const phone = document.getElementById('cust-phone').value;
      const nationality = document.getElementById('cust-nationality').value;
      const amount = document.getElementById('receipt-amount').value;
      const file = fileInput.files[0];

      if(!name || !phone || !amount) {
        alert('กรุณากรอกข้อมูลสำคัญให้ครบถ้วน');
        return;
      }

      let imageUrl = null;

      // 1. อัปโหลดรูปไปยัง Supabase Storage (ถ้ามี)
      if (file) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const { data: uploadData, error: uploadError } = await _supabase.storage
          .from('receipts')
          .upload(fileName, file);

        if (uploadError) {
          alert('อัปโหลดรูปภาพล้มเหลว: ' + uploadError.message);
          return;
        }
        
        // รับ Public URL ของรูปภาพ
        const { data: urlData } = _supabase.storage.from('receipts').getPublicUrl(fileName);
        imageUrl = urlData.publicUrl;
      }

      // 2. บันทึกข้อมูลเข้า Table `receipt_records`
      const { data, error } = await _supabase
        .from('receipt_records')
        .insert([{
          customer_name: name,
          phone_number: phone,
          nationality: nationality,
          receipt_amount: parseFloat(amount),
          receipt_image_url: imageUrl
        }])
        .select();

      if (error) {
        alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล: ' + error.message);
      } else {
        currentRecordId = data[0].id;
        
        // อัปเดต UI เพื่อไป Stepถัดไป (ให้ลูกค้าไปเล่นเกม)
        document.getElementById('summary-name').innerText = name;
        document.getElementById('summary-amount').innerText = amount;
        
        document.getElementById('form-section').classList.add('hidden');
        document.getElementById('reward-section').classList.remove('hidden');
        
        // ดึงรายการรางวัลมาแสดงผล
        loadRewardOptions();
      }
    });

    // โหลดช้อยส์ของรางวัลที่มี Stock มาแสดง
    async function loadRewardOptions() {
      const { data: rewards, error } = await _supabase
        .from('game_rewards')
        .select('*')
        .eq('is_active', true)
        .gt('current_stock', 0); // เอาเฉพาะอันที่ยังมีของ

      const container = document.getElementById('reward-options-container');
      container.innerHTML = '';

      if (rewards.length === 0) {
        container.innerHTML = `<p class="text-sm text-red-500">ไม่มีของรางวัลที่สามารถแจกได้ในขณะนี้</p>`;
        return;
      }

      rewards.forEach(reward => {
        const div = document.createElement('label');
        div.className = "flex items-center justify-between p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 active:bg-indigo-50";
        div.innerHTML = `
          <div class="flex items-center gap-3">
            <input type="radio" name="selected-reward" value="${reward.id}" class="w-4 h-4 text-indigo-600">
            <span class="text-sm font-medium text-gray-700">${reward.reward_name}</span>
          </div>
          <span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full">เหลือ ${reward.current_stock} ชิ้น</span>
        `;
        container.appendChild(div);
      });
    }

    // บันทึกขั้นตอนที่ 2: รางวัลที่ได้
    document.getElementById('btn-finalize').addEventListener('click', async () => {
      const selectedRadio = document.querySelector('input[name="selected-reward"]:checked');
      if (!selectedRadio) {
        alert('กรุณาเลือกรางวัลที่ลูกค้าได้รับ');
        return;
      }
      const rewardId = selectedRadio.value;

      // 1. อัปเดตข้อมูลการรับรางวัลในใบเสร็จใบนี้
      const { error: updateRecordError } = await _supabase
        .from('receipt_records')
        .update({ 
          reward_id: rewardId,
          game_played_at: new Date().toISOString()
        })
        .eq('id', currentRecordId);

      if (updateRecordError) {
        alert('บันทึกรางวัลล้มเหลว: ' + updateRecordError.message);
        return;
      }

      // 2. ตัดสต็อกของรางวัลชิ้นนั้น (-1)
      // หมายเหตุ: ในระบบ Production แนะนำให้ใช้ RPC (Stored Procedure) เพื่อป้องกัน Race Condition แต่ตัวอย่างนี้ใช้คำสั่งดึงมาลบง่ายๆ ก่อนครับ
      const { data: rewardData } = await _supabase.from('game_rewards').select('current_stock').eq('id', rewardId).single();
      if(rewardData) {
        await _supabase.from('game_rewards').update({ current_stock: rewardData.current_stock - 1 }).eq('id', rewardId);
      }

      alert('บันทึกสำเร็จเสร็จสิ้น!');
      location.reload(); // รีเซ็ตหน้ากลับไปเริ่มต้นใหม่สำหรับคิวถัดไป
    });
  </script>
</body>
</html>
