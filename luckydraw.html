<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="auth.js"></script>
    <title>Lucky Draw Live - Pro</title>
    <style>
        .bg-overlay { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
    </style>
</head>
<body id="draw-body" class="bg-slate-950 text-white min-h-screen flex items-center justify-center bg-cover bg-center transition-all duration-1000">
    
    <div class="bg-overlay absolute inset-0"></div>

    <div class="relative z-10 text-center p-6 w-full max-w-4xl">
        <h1 id="event-title" class="text-amber-500 text-3xl font-black mb-2 uppercase tracking-[0.2em]">LUCKY DRAW</h1>
        <p id="total-count" class="text-slate-400 mb-10 font-bold italic">กำลังเตรียมข้อมูล...</p>

        <div class="bg-slate-900/80 border-4 border-amber-500/50 rounded-[4rem] p-16 shadow-[0_0_50px_rgba(245,158,11,0.2)] mb-10">
            <div id="winner-display" class="text-5xl md:text-8xl font-black truncate text-white drop-shadow-2xl">READY?</div>
        </div>

        <button id="btn-spin" onclick="toggleSpin()" class="bg-amber-500 text-slate-950 px-16 py-6 rounded-3xl text-3xl font-black shadow-2xl hover:scale-105 active:scale-95 transition-all">
            START SPIN
        </button>
    </div>

    <script>

        const params = new URLSearchParams(window.location.search);
        const regId = params.get('id');
        const fieldName = params.get('field');

        let allCandidates = []; // รายชื่อคนลงทะเบียนทั้งหมด
        let drawList = [];      // รายชื่อที่เหลือให้สุ่ม
        let currentWinnerId = null; // เก็บ ID ล่าสุดที่เพิ่งได้รางวัลใน DB
        let isSpinning = false;
        let spinInterval;

        async function init() {
            if (!regId || !fieldName) return alert("ข้อมูล URL ไม่ครบ");

            const { data: reg } = await _supabase.from('registrations').select('*').eq('id', regId).single();
            if(reg) {
                document.getElementById('event-title').innerText = reg.title;
                if(reg.bg_url) document.getElementById('draw-body').style.backgroundImage = `url('${reg.bg_url}')`;
            }

            await reloadData();
        }

        async function reloadData() {
            // 1. ดึงรายชื่อผู้ชนะเดิม
            const { data: winners } = await _supabase.from('lucky_winners').select('*').eq('registration_id', regId).order('created_at', {ascending: false});
            const winnerNames = winners.map(w => w.winner_name);
            
            // 2. ดึงรายชื่อผู้สมัครทั้งหมด
            const { data: subs } = await _supabase.from('registration_submissions').select('submitted_data').eq('registration_id', regId);
            allCandidates = subs.map(s => s.submitted_data[fieldName]).filter(name => name);

            // 3. กรองคนที่ไม่เคยได้รางวัล
            drawList = allCandidates.filter(name => !winnerNames.includes(name));

            // 4. แสดงผล UI
            document.getElementById('total-count').innerText = `รายชื่อพร้อมสุ่ม: ${drawList.length} ท่าน`;
        }

        async function toggleSpin() {
            const btn = document.getElementById('btn-spin');
           
            if (isSpinning) {
                clearInterval(spinInterval);
                isSpinning = false;
                btn.innerText = "NEXT ROUND";
                btn.className = "bg-amber-500 text-slate-950 px-12 py-6 rounded-3xl text-3xl font-black shadow-2xl transition-all";

                const winner = document.getElementById('winner-display').innerText;

                // บันทึกผู้ชนะลง DB
                const { data, error } = await _supabase.from('lucky_winners').insert([{
                    registration_id: regId,
                    winner_name: winner,
                    field_name: fieldName
                }]).select();

                if(!error) {
                    currentWinnerId = data[0].id; // เก็บไว้ใช้ถ้าต้องลบ (กรณีไม่อยู่ในงาน)
                  
                    await reloadData();
                }

            } else {
                if (drawList.length === 0) return alert("ไม่เหลือรายชื่อให้สุ่มแล้ว");
                isSpinning = true;
                currentWinnerId = null;
                
                btn.innerText = "STOP!";
                btn.className = "bg-red-600 text-white px-12 py-6 rounded-3xl text-3xl font-black shadow-2xl transition-all animate-pulse";
                
                spinInterval = setInterval(() => {
                    const randomIndex = Math.floor(Math.random() * drawList.length);
                    document.getElementById('winner-display').innerText = drawList[randomIndex];
                }, 50);
            }
        }

   

        init();
    </script>
</body>
</html>
