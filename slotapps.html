<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot Game with Start/Stop</title>
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-size: cover;
            background-image: url('Lucky-01.png');
            color: white;
        }
        
        h1 {
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .slot-machine {
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 80%;
            max-width: 600px;
        }
        
        .slots {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .slot {
            width: 70px;
            height: 100px;
            background: white;
            margin: 0 5px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            color: #333;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        .slot span {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .btn {
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .spin-btn {
            background: #f1c40f;
            color: #2c3e50;
        }
        
        .stop-btn {
            background: #e74c3c;
            color: white;
            display: none;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }
        
        .result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            min-height: 36px;
        }
        
        .win {
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.7);
            animation: pulse 0.5s infinite alternate;
        }
        
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/10.16.6/sweetalert2.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<br>
<br>
<br>
<br>
<br>
<br>
<br>

    <div class="slot-machine">
        <div class="slots">
            <div class="slot" id="slot1"></div>
            <div class="slot" id="slot2"></div>
            <div class="slot" id="slot3"></div>
            <div class="slot" id="slot4"></div>
            <div class="slot" id="slot5"></div>
            <div class="slot" id="slot6"></div>
        </div>
        
        <div class="controls">
            <button class="btn spin-btn" id="spinBtn">SPIN</button>
            <button class="btn stop-btn" id="stopBtn">STOP</button>
        </div>
      
        <div class="result" id="result"></div>
    </div>
   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const slots = [];
        const slotElements = [];
        const resultElement = document.getElementById('result');
        const spinBtn = document.getElementById('spinBtn');
        const stopBtn = document.getElementById('stopBtn');
        let isSpinning = false;
        let animationIds = [];
        let stoppedSlots = 0;
        let cntStop = 0;
        var numList;
        // json
        //$.getJSON("datanum.json", function(json) {  
        //    numList = json;
        //    console.log(numList,"log"); // this will show the info it in firebug console
        // });
         readData();
         
        // Initialize slots
        for (let i = 1; i <= 6; i++) {
            const slotElement = document.getElementById(`slot${i}`);
            slotElements.push(slotElement);
            
            // Create numbers 0-9 in each slot
            for (let j = 0; j <= 9; j++) {
                const numSpan = document.createElement('span');
               // console.log(j,"j"); 
                numSpan.textContent = j;
                numSpan.style.transform = `translateY(${j * 100}%)`;
                slotElement.appendChild(numSpan);
            }
            //console.log(slotElement,"slotElement1"); 
            const spans = slotElement.querySelectorAll('span');
           // console.log(spans,"span1 ,slotIndex"); 
            slots.push({
                currentPos: 0,
                targetPos: 0,
                isStopped: false
            });
        }
      document.addEventListener('keydown', function(event) {
        cntStop = 99;
      //  if (event.key === ' ') { // Spacebar to stop
      //  if (event.key === 'Enter') { // Enter to stop
       if (event.key === 'l' || event.key === 'L') { // 'A' key to stop
        cntStop = -1;
        stopAllSlots();
      }
      console.log('กดปุ่ม:', event.key); // ดูชื่อปุ่มที่กด
      console.log('รหัสปุ่ม:', event.code); // ดูรหัสทางกายภาพของปุ่ม
    });
        // Get random number
        function getRandomNumber() {
            return Math.floor(Math.random() * 10);
        }
        
        // Spin all slots
        function spinAllSlots() {
            if (isSpinning) return;
            
            isSpinning = true;
            stoppedSlots = 0;
            spinBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            resultElement.textContent = '';
            resultElement.classList.remove('win');
            
            // Reset all slots
            for (let i = 0; i < 6; i++) {
                slots[i].isStopped = false;
                slots[i].targetPos = getRandomNumber();
            }
            
            // Start animations
            animationIds = [];
            for (let i = 0; i < 6; i++) {
                animationIds.push(spinSlot(i));
            }
        }
        
        // Spin single slot
        function spinSlot(slotIndex) {
            const slotElement = slotElements[slotIndex];
           // console.log(slotElement,slotIndex,"slotElement,slotIndex"); 
            const spans = slotElement.querySelectorAll('span');
            //console.log(spans,slotIndex,"span ,slotIndex"); 
            const startTime = Date.now();
            const duration = 300000; // 3 seconds max
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
           
                if (slots[slotIndex].isStopped) {
                  
                    // Slot has been stopped - move to target position
                    const currentPos = slots[slotIndex].currentPos;
                    const targetPos = slots[slotIndex].targetPos;
               
                    if (Math.abs(currentPos - targetPos) > 0.1) {
                        slots[slotIndex].currentPos = lerp(currentPos, targetPos, 0.1);
                        spans.forEach((span, index) => {
                            const pos = (index - slots[slotIndex].currentPos + 10) % 10;
                            
                            span.style.transform = `translateY(${pos * 100}%)`;
                        });
                        
                        return requestAnimationFrame(animate);
                    } else {
                       
                        slots[slotIndex].currentPos = targetPos;
                       // console.log(slots[slotIndex].currentPos,"step3.2"); 
                        const slotElementstop = slotElements[slotIndex];
                       // console.log(slotElementstop,slotIndex,"slotElementstop,slotIndex"); 
                        const spans_stop = slotElementstop.querySelectorAll('span');
                      //  console.log(spans_stop,"spans_stop"); 
                        spans_stop.forEach((span, index) => {
                          

                            const pos = (index - targetPos + 10) % 10;
                            
                            span.style.transform = `translateY(${pos * 100}%)`;
                          //  span.textContent = targetPos;
                           // console.log(span.style.transform,index,"index"); 
                        });
                        
                        stoppedSlots++;
                        if (stoppedSlots === 6) {
                            allSlotsStopped();
                        }
                        return;
                    }
                } else {
                    // Slot is still spinning
                    const speed = 0.08 + (slotIndex * 0.01); // Each slot spins at slightly different speed
                    slots[slotIndex].currentPos = (slots[slotIndex].currentPos + speed) % 10;
                    
                    spans.forEach((span, index) => {
                        const pos = (index - slots[slotIndex].currentPos + 10) % 10;
                        span.style.transform = `translateY(${pos * 100}%)`;
                    });
                    
                    if (progress < 1) {
                        return requestAnimationFrame(animate);
                    } else {
                        // Auto-stop if spinning too long
                        stopSlot(slotIndex);
                        return;
                    }
                }
            }
            
            return requestAnimationFrame(animate);
        }
        
        // Linear interpolation
        function lerp(start, end, t) {
            return start * (1 - t) + end * t;
        }
        
        // Stop all slots
        function stopAllSlots() {
            if (!isSpinning) return;""
            cntStop++;
            
            var random = Math.floor(Math.random() * numList.length);
            console.log(cntStop,random,"cntStop,random")
           if(cntStop == 0)
            random ="0";
        console.log(cntStop,random,"cntStop,random")
            const num = numList[random].split("");
            const index = numList.indexOf(numList[random]);
            if (index > -1) { // only splice array when item is found
                numList.splice(index, 1); // 2nd parameter means remove one item only
            }

            console.log(numList); 
            //console.log(random,num,"num");
            for (let i = 0; i < 6; i++) {
                //stopSlot(i);
                slots[i].isStopped = true;
                slots[i].targetPos = num[i];
               // console.log(slots[i].targetPos,"targetPos step1");
            }
        }
        function readData(){
   
        fetch("https://script.google.com/macros/s/AKfycbxYui6kKt6H9BE2TbvdfvF0Wi_gt6sr-en2uKorBB6olxIhmnH2STpfFyU7Nd2721Qg3w/exec", {
         method: 'GET'
         }).then(Swal.fire({
                    position: "center",
                    icon: "success",
                    title: "Loading...",
                    showConfirmButton: false,
                    timer: 1500
        })).then(response =>response.json()).then(data=>{
            // Extract the todo data from the response
            let todo = data.todo;
            numList = data.todo;
            console.log("List:" + numList);
            Swal.fire({
                    position: "center",
                    icon: "success",
                    title: numList.length,
                    showConfirmButton: true,
                    timer: 1500
        })
            // Map each todo item to a string of table row HTML
        }).catch(err => {
            console.log("Error:" + err);
        });
        }
    
 
       // When all slots have stopped
       function allSlotsStopped() {
            isSpinning = false;
            spinBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            checkResult();
        }
        
        // Check result
        function checkResult() {
           
            const finalNumbers = slots.map(slot => Math.round(slot.targetPos) % 10);
            //console.log(finalNumbers,"finalNumbers"); 
            // Check if all numbers are the same
            const allSame = finalNumbers.every(val => val === finalNumbers[0]);
            
           
            resultElement.textContent = 'Lucky!!!';
            resultElement.classList.remove('win');
            resultElement.addEventListener("click", function() {
  // Add the 'highlight' class to the element
  cntStop == 99
});
        }
        
        // Event listeners
        spinBtn.addEventListener('click', spinAllSlots);
        stopBtn.addEventListener('click', stopAllSlots);

    </script>
</body>
</html>
