<!DOCTYPE html>
<html lang="th">
<head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/imask/3.3.0/imask.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit/dist/fontkit.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="auth.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-label { font-weight: bold; color: #444; }
        
        /* PDF Styling - ปรับให้เหมือนต้นฉบับมากที่สุด */
        #pdf-template { background: white; width: 210mm; padding: 10mm; display: none; margin: auto; color: black; }
        .pdf-header { font-size: 11px; line-height: 1.2; margin-bottom: 5px; }
        .pdf-title { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 0; }
        .pdf-subtitle { text-align: center; font-size: 12px; margin-bottom: 10px; }
        .border-box { border: 1.5px solid black; padding: 8px; margin-bottom: 5px; font-size: 13px; line-height: 1.4; }
        .tax-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .tax-table th, .tax-table td { border: 1px solid black; padding: 4px 8px; font-size: 12px; }
        .text-end { text-align: right; }
        .text-center { text-align: center; }
        .checkbox-rect { display: inline-block; width: 12px; height: 12px; border: 1px solid black; vertical-align: middle; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">ระบบออกเอกสาร 50 ทวิ</h2>
        <span id="status" class="badge bg-secondary">กำลังเชื่อมต่อ...</span>
    </div>

    <div class="card">
        <div class="card-body p-4">
           
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-white fw-bold">ประวัติการออกเอกสาร</div>
        <div class="card-body">
          
        </div>
    </div>
</div>



<script>
 
  
// เช็คสิทธิ์เข้าหน้า
      //  protectPage().then(session => { if(session) fetchData(); });


  // เช็คสถานะการเชื่อมต่อ
    async function checkStatus() {
        const { error } = await _supabase.from('tax_certificates').select('id').limit(1);
        const badge = document.getElementById('status');
        if (error) { badge.className = 'badge bg-danger'; badge.innerText = 'Error: ' + error.message; }
        else { badge.className = 'badge bg-success'; badge.innerText = 'เชื่อมต่อ Supabase แล้ว'; }
    }
    checkStatus();

</script>

</body>
