<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - จัดการการแข่งขัน</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .match-card { transition: all 0.2s ease; border: 1px solid transparent; }
        .match-card:hover { border-color: #6366f1; transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black text-slate-800">🏆 จัดการแมตช์</h1>
                <p class="text-slate-500">จัดการคู่แข่งขันและผลการทายผล</p>
            </div>
            <button onclick="openAddModal()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-200">+ เพิ่มคู่แข่งขัน</button>
        </header>

        <div id="match-list" class="grid gap-4">
            <div class="text-center py-20 opacity-30">กำลังโหลดข้อมูล...</div>
        </div>
    </div>

    <div id="match-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-lg shadow-2xl">
            <h2 id="modal-title" class="text-2xl font-black mb-6 text-slate-800">เพิ่มการแข่งขัน</h2>
            <div class="space-y-4">
                <input type="hidden" id="m-id">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">ทีมเหย้า</label>
                        <input type="text" id="m-home" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 ring-indigo-500 font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">ทีมเยือน</label>
                        <input type="text" id="m-away" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 ring-indigo-500 font-bold">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">URL รูปแบนเนอร์</label>
                    <input type="text" id="m-banner" placeholder="https://..." class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-medium text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">วันเวลาแข่ง</label>
                    <input type="datetime-local" id="m-time" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold">
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal('match-modal')" class="flex-1 py-4 bg-slate-100 text-slate-400 font-bold rounded-2xl">ยกเลิก</button>
                    <button onclick="saveMatch()" class="flex-[2] py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg">บันทึกแมตช์</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchMatches() {
            const { data: matches, error } = await _supabase
                .from('matches')
                .select('*')
                .order('match_time', { ascending: false });

            const container = document.getElementById('match-list');
            if (matches.length === 0) {
                container.innerHTML = `<p class="text-center py-10 text-slate-400">ยังไม่มีการแข่งขัน</p>`;
                return;
            }

            container.innerHTML = matches.map(m => {
                const isLocked = m.status === 'locked';
                const isFinished = m.status === 'finished';
                
                let statusBadge = `<span class="bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">เปิดทายผล</span>`;
                if(isLocked) statusBadge = `<span class="bg-amber-100 text-amber-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">ปิดรับทายแล้ว</span>`;
                if(isFinished) statusBadge = `<span class="bg-slate-200 text-slate-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">จบเกม</span>`;

                return `
                <div class="match-card bg-white p-6 rounded-[2rem] shadow-sm flex flex-col md:flex-row justify-between items-center gap-6">
                    <div class="flex items-center gap-6 flex-1">
                        <img src="${m.banner_url || 'https://via.placeholder.com/100x60'}" class="w-24 h-14 rounded-xl object-cover shadow-inner">
                        <div>
                            <div class="mb-1">${statusBadge}</div>
                            <h3 class="font-black text-slate-800 text-lg">${m.team_home} <span class="text-slate-300 mx-1 text-sm font-normal">VS</span> ${m.team_away}</h3>
                            <p class="text-xs text-slate-400 font-bold">${new Date(m.match_time).toLocaleString('th-TH')}</p>
                        </div>
                    </div>
                    
                    <div class="flex gap-2 w-full md:w-auto">
                        ${!isFinished ? `
                            <button onclick="toggleLock('${m.id}', '${m.status}')" class="flex-1 md:flex-none px-4 py-2 ${isLocked ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600'} rounded-xl text-xs font-bold transition-colors">
                                ${isLocked ? '🔓 เปิดทาย' : '🔒 ปิดทาย'}
                            </button>
                            <button onclick="copyPredictLink('${m.id}')" 
                                    class="p-2 bg-slate-50 text-slate-500 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 transition-colors" 
                                    title="คัดลอกลิงก์ให้ลูกค้า">
                                🔗 ลิงก์ทายผล
                            </button>
                            <button onclick="finishGame('${m.id}')" class="flex-1 md:flex-none px-4 py-2 bg-indigo-50 text-indigo-600 rounded-xl text-xs font-bold">🏁 ใส่ผล</button>
                        ` : `<div class="text-right px-4"><p class="text-[10px] font-bold text-slate-400">ผลคะแนน</p><p class="font-black text-indigo-600">${m.home_score} - ${m.away_score}</p></div>`}
                        ${isFinished ? `
                            <button onclick="openLuckyDraw('${m.id}')" 
                                    class="px-4 py-2 bg-yellow-400 text-black rounded-xl text-xs font-black shadow-sm hover:bg-yellow-300">
                                🏆 จับรางวัล
                            </button>
                        ` : ''}
                        <button onclick="editMatch('${m.id}')" class="p-2 text-slate-300 hover:text-indigo-600">⚙️</button>
                        <button onclick="deleteMatch('${m.id}')" class="p-2 text-slate-300 hover:text-red-500">🗑️</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        // ฟังก์ชันปิด/เปิด การทายผล
        async function toggleLock(id, currentStatus) {
            const newStatus = currentStatus === 'pending' ? 'locked' : 'pending';
            await _supabase.from('matches').update({ status: newStatus }).eq('id', id);
            fetchMatches();
        }

        // ฟังก์ชันบันทึกผลการแข่ง
        async function finishGame(id) {
            const h = prompt("คะแนนทีมเหย้า:");
            const a = prompt("คะแนนทีมเยือน:");
            if(h !== null && a !== null) {
                await _supabase.from('matches').update({ 
                    home_score: parseInt(h), 
                    away_score: parseInt(a),
                    status: 'finished' 
                }).eq('id', id);
                fetchMatches();
            }
        }

        // ฟังก์ชันลบ
        async function deleteMatch(id) {
            if(confirm('ยืนยันการลบแมตช์นี้?')) {
                await _supabase.from('matches').delete().eq('id', id);
                fetchMatches();
            }
        }

        function openAddModal() {
            document.getElementById('modal-title').innerText = "เพิ่มการแข่งขัน";
            document.getElementById('m-id').value = "";
            document.getElementById('m-home').value = "";
            document.getElementById('m-away').value = "";
            document.getElementById('m-banner').value = "";
            document.getElementById('match-modal').classList.remove('hidden');
        }
                // เพิ่มฟังก์ชันสำหรับคัดลอกลิงก์
        function copyPredictLink(matchId) {
            // สร้าง URL โดยอ้างอิงจากตำแหน่งไฟล์ปัจจุบัน ไปที่หน้า predict.html
            const baseUrl = window.location.origin + window.location.pathname.replace('admin_matches.html', 'predict.html');
            const fullUrl = `${baseUrl}?matchId=${matchId}`;
            
            navigator.clipboard.writeText(fullUrl).then(() => {
                alert("📋 คัดลอกลิงก์ทายผลแล้ว!\n" + fullUrl);
            }).catch(err => {
                console.error('ไม่สามารถคัดลอกได้', err);
                prompt("คัดลอกลิงก์ที่นี่:", fullUrl); // กรณี Browser ไม่รองรับ clipboard API
            });
        }
        // เพิ่มฟังก์ชันสำหรับเปิดหน้าจับรางวัล
        function openLuckyDraw(matchId) {
            // ส่ง matchId ไปทาง URL เพื่อให้หน้าสุ่มรู้ว่าจะสุ่มของคู่ไหน
            window.open(`luckydraw_matches.html?matchId=${matchId}`, '_blank');
        }
        async function saveMatch() {
            const id = document.getElementById('m-id').value;
            const payload = {
                team_home: document.getElementById('m-home').value,
                team_away: document.getElementById('m-away').value,
                banner_url: document.getElementById('m-banner').value,
                match_time: document.getElementById('m-time').value,
                status: 'pending'
            };

            if(id) await _supabase.from('matches').update(payload).eq('id', id);
            else await _supabase.from('matches').insert([payload]);

            closeModal('match-modal');
            fetchMatches();
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        fetchMatches();
    </script>
</body>
</html>
