<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - เลือกงานและทีม</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-image: url('Challenge-02.png');  color: white; font-family: 'Kanit', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid #00ffcc; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        h2 { color: #ffd700; margin-bottom: 25px; }
        label { display: block; text-align: left; margin-bottom: 8px; color: #ccc; font-size: 0.9rem; }
        
        /* ตกแต่ง Tom Select ให้เข้ากับธีม */
        .ts-control { background: #222 !important; color: white !important; border: 1px solid #444 !important; border-radius: 10px !important; padding: 12px !important; }
        .ts-dropdown { background: #222 !important; color: white !important; border: 1px solid #444 !important; }
        .ts-dropdown .active { background: #00ffcc !important; color: black !important; }
        .item { color: white !important; }

        .input-group { margin-bottom: 20px; }
        input[type="number"] { width: 100%; padding: 15px; border-radius: 10px; background: #222; color: white; border: 1px solid #444; font-size: 1.1rem; box-sizing: border-box; }
        
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #00ffcc; color: black; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #msg { margin-top: 15px; font-weight: bold; min-height: 1.5em; }
        .success { color: #00ffcc; }
        .error { color: #ff4d4d; }
    </style>
</head>
<body>
    <div class="card">
        <h2>โหวตทีมของคุณ</h2>
        
        <div class="input-group">
            <label>1. ค้นหางาน/โครงการ:</label>
            <select id="event-dropdown" placeholder="พิมพ์เพื่อค้นหางาน..."></select>
        </div>

        <div class="input-group">
            <label>2. ค้นหาทีม:</label>
            <select id="team-dropdown" disabled placeholder="เลือกงานก่อนเพื่อค้นหาทีม..."></select>
        </div>

        <div class="input-group">
            <label>3. จำนวนคะแนน:</label>
            <input type="number" id="score-input" value="1" min="1" max="100">
        </div>

        <button id="vote-btn" disabled>ยืนยันการโหวต</button>
        <p id="msg"></p>
    </div>

    <script>
        // สมมติว่ามี _supabase จาก auth.js แล้ว
        const urlParams = new URLSearchParams(window.location.search);
        const autoEventId = urlParams.get('eventId');
        
        let eventSelect, teamSelect; // ตัวแปรสำหรับเก็บ Instance ของ Tom Select

        document.addEventListener('DOMContentLoaded', () => {
            // สร้าง Searchable Dropdown
            eventSelect = new TomSelect("#event-dropdown", {
                create: false,
                onChange: (val) => {
                    if(val) loadTeams(val);
                }
            });

            teamSelect = new TomSelect("#team-dropdown", {
                create: false,
                onChange: (val) => {
                    document.getElementById('vote-btn').disabled = !val;
                }
            });

            initEvents();
        });

        async function initEvents() {
            const { data: events, error } = await _supabase
                .from('events_festival')
                .select('*')
                .order('created_at', {ascending: false});

            if (error || !events) return;

            // เพิ่ม Option เข้าไปใน Tom Select
            const options = events.map(ev => ({ value: ev.id, text: ev.event_name }));
            eventSelect.addOptions(options);

            if (autoEventId && events.find(e => e.id == autoEventId)) {
                eventSelect.setValue(autoEventId);
            }
        }

        async function loadTeams(eventId) {
            teamSelect.clear();
            teamSelect.clearOptions();
            teamSelect.disable();
            
            const { data: teams, error } = await _supabase
                .from('teams')
                .select('*')
                .eq('event_id', eventId)
                .order('team_name');

            if (error || !teams || teams.length === 0) {
                return;
            }

            const options = teams.map(t => ({ value: t.id, text: t.team_name }));
            teamSelect.addOptions(options);
            teamSelect.enable();
        }

        document.getElementById('vote-btn').onclick = async function() {
            const teamId = teamSelect.getValue();
            const pointsToAdd = parseInt(document.getElementById('score-input').value) || 1;
            const msg = document.getElementById('msg');
            const btn = this;

            if (!teamId || pointsToAdd < 1) return;

            btn.disabled = true;
            btn.textContent = 'กำลังบันทึก...';

            try {
                // 1. ดึงคะแนนปัจจุบัน
                const { data, error } = await _supabase
                    .from('teams')
                    .select('score, team_name')
                    .eq('id', teamId)
                    .single();

                if (error) throw error;

                // 2. อัปเดตคะแนน (คะแนนเดิม + คะแนนใหม่ที่กรอก)
                const newScore = (data.score || 0) + pointsToAdd;

                const { error: upError } = await _supabase
                    .from('teams')
                    .update({ score: newScore ,updated_at:new Date().toISOString()})
                    .eq('id', teamId);

                if (upError) throw upError;

                msg.textContent = `✅ เพิ่มคะแนนให้ ${data.team_name} +${pointsToAdd} แต้มสำเร็จ!`;
                msg.className = "success";
                
                setTimeout(() => location.reload(), 2000);

            } catch (err) {
                msg.textContent = "❌ เกิดข้อผิดพลาด กรุณาลองใหม่";
                msg.className = "error";
                btn.disabled = false;
                btn.textContent = 'ยืนยันการโหวต';
            }
        };
    </script>
</body>
</html>
